{% extends 'components/base.html' %}
<!--Page Title -->
{% block title %}
<title>{{profile.name}} Profile</title>
{% endblock title%}
<!-- Page Content -->
{% block content %}
<main id="main">
  <!-- ======= Breadcrumbs ======= -->
  <section class="breadcrumbs">
    <div class="container">
      <div class="d-flex justify-content-between align-items-center">
        <h2>School</h2>
        <ol>
          <li><a href="{% url 'index:home' %}">Home</a></li>
          <li><a href="{% url 'school:browse' %}">School</a></li>
          <li>Quiz</li>
        </ol>
      </div>
    </div>
  </section>
  <!-- End Breadcrumbs -->

  <section class="inner-page row justify-content-center p-3">
    <div class="col-lg-6">
      <form
        action="{% url 'school:update_profile' %}"
        method="post"
        enctype="multipart/form-data"
        role="form"
        class="php-email-form"
      >
        {% csrf_token %} {{form}}
        <div class="text-center">
          <input
            type="submit"
            value="Save and Update"
            class="btn p-2 mt-2 form-control"
            style="background-color: #6610f2; color: #fff"
          />
        </div>
      </form>
    </div>
  </section>
</main>
<!-- End #main -->

<!-- JavaScript -->
<script>
  document.querySelector("#header").style.background = "rgba(24, 6, 185, 0.8)";

  document.querySelector(".school").classList.add("active");
</script>
{% endblock content %}
