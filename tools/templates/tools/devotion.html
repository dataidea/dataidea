{% extends 'components/base.html' %}
<!-- Page Content -->
{% block content %}
<!-- Styles -->
<style>

  form div {
    margin-top: 0.5em;
  }

  form input {
    width: 100%;
    padding: 0.5em;
    border: 1px solid gray;
    border-radius: 0.25em;
    margin-top: 0.25em;
  }

</style>

<!-- Main Content -->
<main id="main">
  <!-- ======= Breadcrumbs ======= -->
  <section class="breadcrumbs">
    <div class="container">
      <div class="d-flex justify-content-between align-items-center">
        <h2>Devotion Generator</h2>
        <ol>
          <li><a href="/">Home</a></li>
          <li><span>Services</span></li>
          <li><span>Our Tools</span></li>
          <li><span>Devotion Generator</span></li>
        </ol>
      </div>
    </div>
  </section>
  <!-- End Breadcrumbs -->

  <!-- Add Notes -->
  <div class="d-flex justify-content-center">
    <div class="container m-3 row">
      <h2 class="text-center">Enter Details</h2>
        <form method="post" 
        class="m-auto col-md-6"
        enctype="multipart/form-data">
          {% csrf_token %} 
          <!-- Display form -->
          {{ audio_form.as_div }}
          <!-- Devotion Form -->
          {{ devotion_form.as_div }}
          <input
          id="submit-btn"
            type="submit"
            value="Submit"
            class="btn p-2 mt-2"
            style="background-color: #6610f2; color: #fff"
                  />
        </form>
      </div>
      <!--Google AdSense-->
      <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8076040302380238"
      crossorigin="anonymous"></script>
        <ins class="adsbygoogle"
            style="display:block; text-align:center;"
            data-ad-layout="in-article"
            data-ad-format="fluid"
            data-ad-client="ca-pub-8076040302380238"
            data-ad-slot="1253561907"></ins>
        <script>
      (adsbygoogle = window.adsbygoogle || []).push({});
</script>
 <!--End of Google AdSense-->
  </div>
</div>
<!-- End Notes -->
</main>
<!-- End #main -->

<!-- JavaScript -->
<script>
const header = document.querySelector("#header");
header.style.background = "rgba(24, 6, 185, 0.8)";
const detailLoader = (content) => {
  document.querySelector(".detail").value = content;
};

document.querySelector("input[name='scripture']").placeholder = 'Enter scripture here'

document.querySelector('#submit-btn').addEventListener('click', () => {
    alert("Processing, it may take 15%-30% of the file's duration, eg a 10 minute file takes 90-180 seconds to complete. After that, your transcription will automatically be downloaded.")
})
</script>

{% endblock %}
