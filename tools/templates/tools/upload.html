{% extends 'components/base.html' %}
<!-- Page Content -->
{% block content %}
<!-- Styles -->
<style>

  form div {
    margin-top: 0.5em;
  }

  form input[type='file'], input[type='submit'] {
    width: 100%;
    padding: 0.5em;
    border: 1px solid gray;
    border-radius: 0.25em;
    margin-top: 0.25em;
  }

  legend {
    margin-top: 0.25em;
    font-size: medium;
  }

  #preloader {
    display: none;
  }

</style>
<main id="main">
  <!-- ======= Breadcrumbs ======= -->
  <section class="breadcrumbs">
    <div class="container">
      <div class="d-flex justify-content-between align-items-center">
        <h2>Transcriber</h2>
        <ol>
          <li><a href="/">Home</a></li>
          <li><span>Services</span></li>
          <li><span>Our Tools</span></li>
          <li><span>Transcriber</span></li>
        </ol>
      </div>
    </div>
  </section>
  <!-- End Breadcrumbs -->

  <!-- Add Notes -->
  <div class="d-flex justify-content-center">
    <div class="container m-3 row">
        <h2 class="text-center">Upload File</h2>
        <form method="post" 
        class="m-auto col-md-6"
        enctype="multipart/form-data"
        onsubmit="displayPreloader()"
        >
          {% csrf_token %} 
          <!-- Audio Form -->
          {{ audio_form.as_div }} 
          <!-- Options Form -->
          {{ options_form.as_div }}
          <input
          id="submit-btn"
            type="submit"
            onclick="dis"
            value="Upload and Transcribe"
            class="btn p-2 mt-2"
            style="background-color: #6610f2; color: #fff"
                  />
        </form>
      </div>
  </div>
</div>
<!-- End Notes -->

<!-- Preloader -->
<div id="preloader"></div>
</main>
<!-- End #main -->

<!-- JavaScript -->
<script>
const header = document.querySelector("#header");
header.style.background = "rgba(24, 6, 185, 0.8)";
const detailLoader = (content) => {
  document.querySelector(".detail").value = content;
};

document.querySelector('#submit-btn').addEventListener('click', () => {
    alert("Processing, it may take 15%-30% of the file's duration, eg a 10 minute file takes 90-180 seconds to complete. After that, your transcription will automatically be downloaded.")
})

const displayPreloader = () => {
  document.querySelector('#preloader').style.display = 'block'
}
</script>

{% endblock %}
